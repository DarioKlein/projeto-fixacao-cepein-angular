<div class="form-container">
  <div class="form-card">
    <div class="form-header">
      <h2>
        <i class="fas" [ngClass]="isEdicao ? 'fa-edit' : 'fa-plus-circle'"></i>
        {{ isEdicao ? 'Editar Tarefa' : 'Nova Tarefa' }}
      </h2>
    </div>
    <div class="form-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="titulo"> <i class="fas fa-heading"></i> Título </label>
          <input
            type="text"
            id="titulo"
            class="form-control"
            formControlName="titulo"
            pInputText
            placeholder="Digite o título da tarefa"
          />
          <div *ngIf="submitted && titulo.errors" class="error-message">
            <p-message
              *ngIf="titulo.errors.required"
              severity="error"
              text="Título é obrigatório"
            ></p-message>
            <p-message
              *ngIf="titulo.errors.minlength"
              severity="error"
              text="Mínimo de 3 caracteres"
            ></p-message>
            <p-message
              *ngIf="titulo.errors.maxlength"
              severity="error"
              text="Máximo de 100 caracteres"
            ></p-message>
          </div>
        </div>

        <div class="form-group">
          <label for="descricao">
            <i class="fas fa-align-left"></i> Descrição
          </label>
          <textarea
            id="descricao"
            class="form-control"
            formControlName="descricao"
            rows="4"
            placeholder="Digite a descrição da tarefa"
          ></textarea>
          <div *ngIf="submitted && descricao.errors" class="error-message">
            <p-message
              *ngIf="descricao.errors.required"
              severity="error"
              text="Descrição é obrigatória"
            ></p-message>
            <p-message
              *ngIf="descricao.errors.minlength"
              severity="error"
              text="Mínimo de 5 caracteres"
            ></p-message>
            <p-message
              *ngIf="descricao.errors.maxlength"
              severity="error"
              text="Máximo de 500 caracteres"
            ></p-message>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group half">
            <label for="prioridade">
              <i class="fas fa-flag"></i> Prioridade
            </label>
            <div class="radio-group">
              <div class="radio-item">
                <input
                  type="radio"
                  id="baixa"
                  formControlName="prioridade"
                  [value]="prioridadeBAIXA"
                />
                <label for="baixa" class="prioridade-baixa">Baixa</label>
              </div>
              <div class="radio-item">
                <input
                  type="radio"
                  id="media"
                  formControlName="prioridade"
                  [value]="prioridadeMEDIA"
                />
                <label for="media" class="prioridade-media">Média</label>
              </div>
              <div class="radio-item">
                <input
                  type="radio"
                  id="alta"
                  formControlName="prioridade"
                  [value]="prioridadeALTA"
                />
                <label for="alta" class="prioridade-alta">Alta</label>
              </div>
            </div>
          </div>

          <div class="form-group half">
            <label for="dataLimite">
              <i class="fas fa-calendar-alt"></i> Data Limite
            </label>
            <input
              type="date"
              id="dataLimite"
              class="form-control"
              formControlName="dataLimite"
            />
            <div *ngIf="submitted && dataLimite.errors" class="error-message">
              <p-message
                *ngIf="dataLimite.errors.required"
                severity="error"
                text="Data limite é obrigatória"
              ></p-message>
              <p-message
                *ngIf="dataLimite.errors.dataFutura"
                severity="error"
                text="A data deve ser futura"
              ></p-message>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <p-button
            type="submit"
            [label]="isEdicao ? 'SALVAR' : 'CADASTRAR'"
            [icon]="isEdicao ? 'fas fa-save' : 'fas fa-plus'"
            styleClass="ui-button-success"
            [disabled]="tarefaCriada"
          ></p-button>
          <p-button
            type="button"
            label="CANCELAR"
            icon="fas fa-times"
            (onClick)="cancelar()"
            styleClass="ui-button-secondary"
          ></p-button>
        </div>
      </form>
    </div>
  </div>
</div>
