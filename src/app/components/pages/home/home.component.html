<p-messages key="vencidas"></p-messages>

<div class="tarefa-container">
  <div class="tarefa-header">
    <h2><i class="fas fa-tasks"></i> Minhas Tarefas</h2>
    <div class="tarefa-header-actions">
      <p-dropdown
        [options]="prioridadeOptions"
        [(ngModel)]="filtroPrioridade"
        (onChange)="filtrarTarefas()"
        placeholder="Filtrar por prioridade"
      ></p-dropdown>
      <p-button
        label="Nova Tarefa"
        icon="fas fa-plus"
        routerLink="/tarefa/nova"
        styleClass="ui-button-success"
      ></p-button>
    </div>
  </div>

  <div class="tarefa-list" *ngIf="tarefasFiltradas.length > 0">
    <app-card-tarefa
      *ngFor="let tarefa of tarefasFiltradas"
      [tarefa]="tarefa"
      (editar)="editar($event)"
      (excluir)="excluir($event)"
      (toggleConcluida)="toggleConcluida($event)"
    ></app-card-tarefa>
  </div>

  <div class="empty-state" *ngIf="tarefasFiltradas.length === 0">
    <i class="fas fa-clipboard-list"></i>
    <h3>Nenhuma tarefa encontrada</h3>
    <p>Clique em "Nova Tarefa" para criar sua primeira tarefa!</p>
  </div>
</div>

<p-dialog
  header="Confirmar Exclusão"
  [(visible)]="showDeleteModal"
  [modal]="true"
  [closable]="true"
  [style]="{ width: '400px' }"
  [draggable]="false"
  [resizable]="false"
>
  <div class="p-dialog-content">
    <p><i class="fas fa-exclamation-triangle"></i> Tem certeza que deseja excluir esta tarefa?</p>
    <p class="text-muted">Esta ação não pode ser desfeita.</p>
  </div>
  <div class="p-dialog-footer">
    <p-button
      type="button"
      label="CANCELAR"
      icon="fas fa-times"
      (onClick)="fecharModal()"
      styleClass="ui-button-secondary"
    ></p-button>
    <p-button
      type="button"
      label="EXCLUIR"
      icon="fas fa-trash"
      (onClick)="confirmarExclusao()"
      styleClass="ui-button-danger"
    ></p-button>
  </div>
</p-dialog>
