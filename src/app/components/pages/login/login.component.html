<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card">
        <div class="card-header">
          <h4><i class="fas fa-sign-in-alt"></i> Login de Usuário</h4>
        </div>
        <div class="card-body">
          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="form-group">
              <label for="login"
                ><i class="fas fa-user"></i> Login</label
              >
              <input
                type="text"
                id="login"
                class="form-control"
                formControlName="login"
                pInputText
                placeholder="Digite seu login"
              />
              <div *ngIf="submitted && login.errors" class="error-message">
                <p-message
                  *ngIf="login.errors.required"
                  severity="error"
                  text="Login é obrigatório"
                ></p-message>
                <p-message
                  *ngIf="login.errors.minlength"
                  severity="error"
                  text="Mínimo de 4 caracteres"
                ></p-message>
                <p-message
                  *ngIf="login.errors.maxlength"
                  severity="error"
                  text="Máximo de 20 caracteres"
                ></p-message>
              </div>
            </div>

            <div class="form-group">
              <label for="senha"><i class="fas fa-lock"></i> Senha</label>
              <div class="input-group">
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  id="senha"
                  class="form-control"
                  formControlName="senha"
                  pInputText
                  placeholder="Digite sua senha"
                />
                <div class="input-group-append">
                  <button
                    type="button"
                    class="btn btn-outline-secondary"
                    (click)="togglePassword()"
                  >
                    <i
                      [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"
                    ></i>
                  </button>
                </div>
              </div>
              <div *ngIf="submitted && senha.errors" class="error-message">
                <p-message
                  *ngIf="senha.errors.required"
                  severity="error"
                  text="Senha é obrigatória"
                ></p-message>
                <p-message
                  *ngIf="senha.errors.minlength"
                  severity="error"
                  text="Mínimo de 6 caracteres"
                ></p-message>
                <p-message
                  *ngIf="senha.errors.maxlength"
                  severity="error"
                  text="Máximo de 20 caracteres"
                ></p-message>
              </div>
            </div>

            <div class="form-group text-center">
              <p-button
                type="submit"
                label="ENTRAR"
                icon="fas fa-sign-in-alt"
                styleClass="ui-button-success"
              ></p-button>
              <p-button
                type="button"
                label="LIMPAR"
                icon="fas fa-eraser"
                (onClick)="onReset()"
                styleClass="ui-button-secondary ml-2"
              ></p-button>
            </div>

            <div class="text-center mt-3">
              <span class="text-muted">Não tem conta? </span>
              <a routerLink="/auth/cadastro" class="text-primary font-weight-bold">
                Cadastre-se aqui
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
