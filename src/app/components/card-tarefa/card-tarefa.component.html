<div class="tarefa-card">
  <div class="tarefa-info">
    <div class="tarefa-status" [ngClass]="getStatusClass(tarefa.concluida)">
      <i [class]="getStatusIcon(tarefa.concluida)"></i>
    </div>
    <div class="tarefa-details">
      <h3 class="tarefa-titulo">{{ tarefa.titulo }}</h3>
      <p class="tarefa-descricao">{{ tarefa.descricao }}</p>
      <div class="tarefa-meta">
        <span class="tarefa-data">
          <i class="far fa-calendar-alt"></i> {{ formatarData(tarefa.dataLimite) }}
        </span>
        <span class="tarefa-prioridade" [ngClass]="getPrioridadeClass(tarefa.prioridade)">
          {{ getPrioridadeLabel(tarefa.prioridade) }}
        </span>
      </div>
    </div>
  </div>
  <div class="tarefa-actions">
    <button
      class="btn-action btn-editar"
      (click)="editar.emit(tarefa)"
      title="Editar"
      *ngIf="!tarefa.concluida"
    >
      <i class="fas fa-edit"></i>
    </button>
    <button
      class="btn-action btn-concluir"
      (click)="toggleConcluida.emit(tarefa)"
      [title]="tarefa.concluida ? 'Reabrir' : 'Concluir'"
    >
      <i [class]="tarefa.concluida ? 'fas fa-undo' : 'fas fa-check'"></i>
    </button>
    <button
      class="btn-action btn-excluir"
      (click)="excluir.emit(tarefa)"
      title="Excluir"
    >
      <i class="fas fa-trash"></i>
    </button>
  </div>
</div>
